<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>auth</title></head>
<body>
<script>
  const hash = window.location.hash || '';
  const search = window.location.search || '';

  function hasToken(str) {
    return str.includes('access_token');
  }

  if (hasToken(hash) || hasToken(search)) {
    // Parse from whichever part has the token
    const raw = hasToken(hash) ? hash.slice(1) : search.slice(1);
    const p = new URLSearchParams(raw);
    const token = p.get('access_token');
    const expiresIn = parseInt(p.get('expires_in') || '3600');

    if (token) {
      if (window.parent !== window) {
        // Inside silent refresh iframe — post back to parent
        window.parent.postMessage('#' + raw, '*');
      } else {
        // Main window initial sign-in — store and redirect
        try {
          localStorage.setItem('accc_token', JSON.stringify({
            token: token,
            expires: Date.now() + (expiresIn - 60) * 1000
          }));
        } catch(e) {}
        window.location.replace('accc-reader.html');
      }
    } else {
      window.location.replace('accc-reader.html');
    }
  } else if (search.includes('error')) {
    if (window.parent !== window) {
      window.parent.postMessage('error=' + search, '*');
    } else {
      window.location.replace('accc-reader.html');
    }
  } else {
    // No token, no error — just redirect home
    window.location.replace('accc-reader.html');
  }
</script>
</body>
</html>
